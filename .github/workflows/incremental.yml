name: Oura Incremental Sync

on:
  schedule:
    # 06:00 UTC daily — Oura finalises most nightly data by then
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Trailing days to re-fetch (default: 14)'
        required: false
        default: '14'

jobs:
  incremental:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      # Restore the DuckDB file from the previous run's cache.
      # Using run_number in the key so each run saves a fresh entry;
      # restore-keys picks up the most recent prior run's file.
      - name: Restore DuckDB cache
        id: db-cache
        uses: actions/cache@v4
        with:
          path: oura.duckdb
          key: oura-db-${{ github.run_number }}
          restore-keys: |
            oura-db-

      - name: Run incremental sync
        env:
          # Add one secret per person following the OURA_TOKEN_<PERSON> convention.
          # Example: add OURA_TOKEN_KARTIK and OURA_TOKEN_PARTNER in
          # Settings → Secrets and variables → Actions → Repository secrets.
          OURA_TOKEN_KARTIK: ${{ secrets.OURA_TOKEN_KARTIK }}
          OURA_TOKEN_PARTNER: ${{ secrets.OURA_TOKEN_PARTNER }}
          OURA_DB_PATH: oura.duckdb
        run: |
          DAYS=${{ github.event.inputs.days || '14' }}
          uv run python scripts/incremental.py --days "$DAYS" --db-path oura.duckdb
